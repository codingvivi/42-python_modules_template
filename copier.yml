_subdirectory: template

project_name:
  type: str
  help: Project name (used for the turnin tarball, e.g. python_module_00)
  default: python_module_00

num_exercises:
  type: int
  help: How many exercise folders (ex0..exN-1)?
  default: 4

_tasks:
  - |
    for i in $(seq 0 $(({{ num_exercises }} - 1))); do
        mkdir -p "src/ex$i"
        cat > "src/ex$i/main.py" <<'PYEOF'
    def print_header(title: str) -> None:
        print(f"=== {title} ===")
        print("")


    def main() -> None:
        pass


    if __name__ == "__main__":
        main()
    PYEOF
    done
  - "uv sync"
  - "jj git init"
  - "gh repo create '42-{{project_name}}' --public --source=. --remote=origin"
  - "jj bookmark track main --remote=origin"
